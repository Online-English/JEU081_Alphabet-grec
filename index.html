<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Grec Master Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <div class="top-bar">
        <button id="btn-boutique">🛍️ Boutique</button>
        <button id="btn-stats">📊 Stats</button>
        <button id="slow-toggle" class="toggle-btn">🐢 Audio</button>
        <button id="btn-fiche">📚 Fiche</button>
    </div>
    
    <header>
        <div class="header-main">
            <div class="avatar-badge"><span id="avatar-val">👶</span></div>
            <div class="level-badge">Niv. <span id="level-val">1</span></div>
            <div class="combo-badge" id="combo-box">Combo <span id="combo-val">x1</span> 🔥</div>
        </div>
        <div id="stats">⚡ <span id="score">0</span> XP | Série : <span id="streak">0</span></div>
        <div id="timer-container" class="timer-hidden">⏱️ Temps restant : <span id="timer-val">60</span>s</div>
    </header>

    <main>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <select id="exercise-select">
            <option value="qcm">Mode QCM (Entraînement)</option>
            <option value="lecture">Mode Lecture (Saisie)</option>
            <option value="audition">Mode Audition (Écoute)</option>
            <option value="ecriture">Mode Écriture (Clavier Grec)</option>
            <option value="oral">🗣️ Expression Orale (Micro)</option>
            <option value="chrono">⏱️ CONTRE-LA-MONTRE (QCM Rapide)</option>
        </select>

        <div id="exercise-container">
            <p>Préparation de l'arène...</p>
        </div>

        <h3>Votre Carte de Maîtrise</h3>
        <div id="dashboard-grid" class="dashboard-grid"></div>
    </main>

    <dialog id="modal-fiche">
        <div class="modal-header">
            <h2>Alphabet & Combinaisons</h2>
            <button id="close-modal">❌</button>
        </div>
        <div id="fiche-content"></div>
    </dialog>

    <dialog id="modal-boutique">
        <div class="modal-header">
            <h2>Boutique des Dieux</h2>
            <button id="close-boutique">❌</button>
        </div>
        <div class="shop-section">
            <h3>Vos Avatars Débloqués</h3>
            <div id="avatars-pool" class="avatars-pool"></div>
        </div>
        <div class="shop-section">
            <h3>Thèmes d'Arène</h3>
            <div id="themes-pool" class="themes-pool"></div>
        </div>
    </dialog>

    <dialog id="modal-stats">
        <div class="modal-header">
            <h2>Vos Performances Statistiques</h2>
            <button id="close-stats">❌</button>
        </div>
        <div id="stats-content" class="stats-content">
            </div>
    </dialog>

    <script src="script.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
