<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Grec Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙</button>
    <header>
        <h1>Grec Master</h1>
        <div id="stats">Score: <span id="score">0</span> | Streak: <span id="streak">0</span></div>
    </header>

    <main>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <select id="exercise-select">
            <option value="lecture">Lecture (Lettre -> Nom)</option>
            <option value="audition">Audition (Écouter -> Lettre)</option>
            <option value="ecriture">Écriture (Nom -> Lettre)</option>
        </select>

        <div id="exercise-container">
            <p>Chargement...</p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
