<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maîtrise de l'Alphabet Grec</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Alphabet Grec</h1>
        <button id="btn-fiche">Fiche Synthèse</button>
    </header>

    <main>
        <section class="controls">
            <label for="exercise-select">Choisissez un exercice :</label>
            <select id="exercise-select">
                <option value="">-- Sélectionner --</option>
                <option value="lecture">Lecture (Lettre -> Nom)</option>
                <option value="audition">Audition (Écouter -> Lettre)</option>
                <option value="ecriture">Écriture (Nom -> Lettre)</option>
            </select>
        </section>

        <div id="exercise-container">
            <p>Bienvenue ! Sélectionnez un mode pour commencer l'apprentissage.</p>
        </div>
    </main>

    <dialog id="modal-fiche">
        <div class="modal-header">
            <h2>Fiche Synthèse</h2>
            <button id="close-modal">Fermer</button>
        </div>
        <div id="fiche-content"></div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
