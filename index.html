<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Grec Master Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <button id="theme-toggle">🌙</button>
        <button id="slow-toggle" class="toggle-btn">🐢 Audio Lent : OFF</button>
        <button id="btn-fiche">📚 Fiche</button>
    </div>
    
    <header>
        <div class="level-badge">Niveau <span id="level-val">1</span></div>
        <div id="stats">⚡ <span id="score">0</span> / 40000 XP | 🔥 Série: <span id="streak">0</span></div>
    </header>

    <main>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <select id="exercise-select">
            <option value="qcm">QCM (Idéal Débutant)</option>
            <option value="lecture">Lecture (Saisie)</option>
            <option value="audition">Audition</option>
            <option value="ecriture">Écriture</option>
            <option value="oral">🗣️ Expression Orale</option>
        </select>

        <div id="exercise-container">
            <p>Chargement de l'arène...</p>
        </div>

        <h3>Votre Carte de Maîtrise</h3>
        <div id="dashboard-grid" class="dashboard-grid"></div>
    </main>

    <dialog id="modal-fiche">
        <div class="modal-header">
            <h2>Alphabet & Combinaisons</h2>
            <button id="close-modal">❌</button>
        </div>
        <div id="fiche-content"></div>
    </dialog>

    <script src="script.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
